name: ✨ Feature Request
description: Suggest a new feature or improvement for Focus
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! 💡
        
        Your ideas help make Focus better for everyone.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: Is your feature request related to a problem? What would you like to achieve?
      placeholder: I'm frustrated when... / I wish I could... / It would be helpful if...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
      placeholder: What should happen? How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or features?
      placeholder: Other ways to solve this problem...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, mockups, or examples about the feature request here.
      placeholder: Any other information that might help us understand your suggestion...
    validations:
      required: false

  - type: dropdown
    id: willingness
    attributes:
      label: Willingness to Help
      description: Would you be willing to help test this feature if implemented?
      options:
        - "Yes, I'd love to test it!"
        - "Maybe, depending on the timeline"
        - "No, but I'm happy to provide feedback"
    validations:
      required: false
